version: "3.8"
services:
    mongodb:
        image: mongo:8.0
        container_name: opticStore_mongodb
        restart: always
        ports:
            - "27018:27017"
        volumes:
            - mongodb_data:/data/db
        environment:
            MONGO_INITDB_ROOT_USERNAME: user
            MONGO_INITDB_ROOT_PASSWORD: user123

volumes:
    mongodb_data: